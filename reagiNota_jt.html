<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReagiNota — UE João Tavares da Costa</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230f0f1a'/><stop offset='1' stop-color='%231a1a3e'/></linearGradient><linearGradient id='liq' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23ff6b6b'/><stop offset='1' stop-color='%23c8202e'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23bg)'/><rect x='30' y='8' width='40' height='6' rx='3' fill='%23e63946'/><path d='M36 40 L20 70 Q15 82 26 87 L74 87 Q85 82 80 70 L64 40 Z' fill='%23ffffff' opacity='.07' stroke='%2352d68a' stroke-width='2.5'/><path d='M33 58 Q36 55 40 58 L22 80 Q17 87 28 88 L72 88 Q83 87 78 80 Z' fill='url(%23liq)' opacity='.92'/><circle cx='38' cy='71' r='4' fill='%23ffffff' opacity='.25'/><circle cx='30' cy='52' r='3' fill='%2352d68a' opacity='.7'/><circle cx='70' cy='48' r='2' fill='%23a8e6cf' opacity='.6'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module">
// ── FIREBASE ──────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCHR8cuC25TCDyZJNkV2R_04oTdUSdVAyk",
  authDomain: "corretor-gabarito.firebaseapp.com",
  databaseURL: "https://corretor-gabarito-default-rtdb.firebaseio.com",
  projectId: "corretor-gabarito",
  storageBucket: "corretor-gabarito.firebasestorage.app",
  messagingSenderId: "823312147686",
  appId: "1:823312147686:web:196d3492a3a37d8a460727"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

window._fbSignIn = () => signInWithPopup(auth, provider);
window._fbSignOut = () => signOut(auth);
window._fbSave = async (uid, data) => { await set(ref(db, 'usuarios/' + uid), data); };
window._fbLoad = async (uid) => { const snap = await get(ref(db, 'usuarios/' + uid)); return snap.exists() ? snap.val() : null; };

onAuthStateChanged(auth, user => {
  window._fbUser = user;
  if(typeof window._onAuthChange === 'function') window._onAuthChange(user);
});
</script>
<style>
:root {
  --ink: #161616; --ink2: #5a5a6a; --ink3: #9898a8;
  --paper: #f8f7f4; --paper2: #efede8; --paper3: #e5e2db;
  --line: #dddad4; --blue: #2752e8; --blue-bg: #eef1fd;
  --green: #1a7a4a; --green-bg: #e6f4ed;
  --red: #c8202e; --red-bg: #fdedef;
  --amber: #a06020; --amber-bg: #fdf3e7;
  --r: 10px; --sh: 0 1px 4px rgba(0,0,0,.07), 0 4px 20px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}

/* CORREÇÃO AQUI: Permitir scroll se o conteúdo for maior que a tela */
html,body{height:100%; overflow: auto;} 
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column; min-height: 100vh;}

.topbar{
  height:54px;background:var(--ink);color:#fff;display:flex;align-items:center;
  padding:0 20px;gap:16px;flex-shrink:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25)
}
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-mark{width:32px;height:32px;background:#e63946;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:700;color:#fff}
.tb-name{font-weight:800;font-size:1rem}
.tb-sep{width:1px;height:24px;background:rgba(255,255,255,.15)}
.tb-nav{display:flex;gap:2px}
.tb-btn{background:transparent;border:none;color:rgba(255,255,255,.55);padding:6px 14px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:6px}
.tb-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.tb-btn.on{background:#e63946;color:#fff}
.tb-turma{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:5px 12px;border-radius:7px;font-size:.8rem;cursor:pointer;min-width:160px}

.body{display:flex;flex:1; overflow: hidden;} /* O container pai segura o overflow */

.sidebar{
  width:270px;background:#fff;border-right:1px solid var(--line);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden
}
.sb-sec{padding:14px;border-bottom:1px solid var(--line)}
.sb-head{display:flex;align-items:center;justify-content:space-between;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink3);margin-bottom:10px}
.sb-scroll{overflow-y:auto;flex:1;padding:4px 0}

/* CORREÇÃO AQUI: Garantir que a área principal role o conteúdo */
.main{flex:1; overflow-y:auto; background:var(--paper); padding-bottom: 50px;} 
.page{display:none;padding:26px 28px; min-height: fit-content;}
.page.on{display:block}

.btn{border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.82rem;padding:9px 16px;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#1e40c8;box-shadow:0 4px 12px rgba(39,82,232,.3)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink2)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-xs{padding:4px 9px;font-size:.71rem}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:.68rem;font-weight:800;text-transform:uppercase;color:var(--ink3)}
input[type=text],input[type=number],select,textarea{background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;width:100%;font-family:inherit}

.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--sh); margin-bottom: 20px;}

.st-row{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .1s;font-size:.82rem}
.st-row:hover{background:var(--paper2)}
.st-row.on{background:#eef1fd;border-left:3px solid var(--blue)}
.st-av{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;flex-shrink:0}
.st-score{margin-left:auto;font-family:'DM Mono',monospace;font-size:.72rem;padding:2px 8px;border-radius:20px}
.s-g{background:var(--green-bg);color:var(--green)}
.s-a{background:var(--amber-bg);color:var(--amber)}
.s-r{background:var(--red-bg);color:var(--red)}
.s-n{background:var(--paper2);color:var(--ink3)}

.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px}
.tab-btn{padding:8px 15px;border:none;background:none;font-weight:700;color:var(--ink3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s}
.tab-btn.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}
.tab-pane.on{display:block}

.score-ring{width:86px;height:86px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0}
.sr-n{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:700}
.sr-g{background:var(--green-bg);color:var(--green);border:3px solid #5ec490}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.1)}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo"><div class="tb-mark">⚗️</div><div class="tb-name">ReagiNota</div></div>
  <div class="tb-sep"></div>
  <div class="tb-nav">
    <button class="tb-btn on" onclick="nav('correcao')" id="n-correcao">📋 Correção</button>
    <button class="tb-btn" onclick="nav('turmas')" id="n-turmas">🏫 Turmas</button>
    <button class="tb-btn" onclick="nav('organizar')" id="n-organizar">📂 Organizar</button>
    <button class="tb-btn" onclick="nav('relatorios')" id="n-relatorios">📊 Relatórios</button>
  </div>
  <select class="tb-turma" id="turma-sel" onchange="trocarTurma()">
    <option value="">— Selecionar Turma —</option>
  </select>
</div>

<div class="body">
  <div class="sidebar">
    <div class="sb-sec" style="flex:1;display:flex;flex-direction:column">
      <div class="sb-head">Provas <button class="btn btn-xs btn-blue" onclick="abrirModalNovaProva()">+ Nova</button></div>
      <div id="prova-tree" class="sb-scroll"></div>
    </div>
    <div class="sb-sec" style="flex:1;display:flex;flex-direction:column">
      <div class="sb-head">Alunos <button class="btn btn-xs btn-blue" onclick="openModal('m-lista')">📋 Lista</button></div>
      <div id="aluno-list" class="sb-scroll"></div>
    </div>
  </div>

  <div class="main">
    <div id="p-correcao" class="page on">
      <div id="no-sel" style="text-align:center; padding:100px 0;">Selecione prova e aluno no menu lateral.</div>
      <div id="corr-content" style="display:none">
        <div class="card" id="result-wrap"></div>
      </div>
    </div>

    <div id="p-turmas" class="page">
      <h2>🏫 Minhas Turmas</h2>
      <div id="turmas-wrap"></div>
    </div>

    <div id="p-relatorios" class="page">
      <div class="tab-bar">
        <button class="tab-btn on" onclick="relTab('geral',this)">Visão Geral</button>
        <button class="tab-btn" onclick="relTab('questao',this)">Por Questão</button>
      </div>
      <div id="tp-geral" class="tab-pane on"></div>
      <div id="tp-questao" class="tab-pane"></div>
    </div>
  </div>
</div>

<!-- MODAL TURMA -->
<div class="overlay" id="m-turma">
  <div class="modal">
    <h3>Nova Turma</h3>
    <div class="field"><label>Nome</label><input type="text" id="t-nome"></div>
    <button class="btn btn-blue" onclick="criarTurma()">Criar</button>
  </div>
</div>

<script>
const SK = 'gabia_v2';
let S = { turmas:[], provas:[], alunos:[], correcoes:[], turmaId:null, provaId:null, alunoId:null };

function save(){ localStorage.setItem(SK, JSON.stringify(S)); }
function load(){ const d=localStorage.getItem(SK); if(d) S=JSON.parse(d); }
load();

function nav(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tb-btn').forEach(x=>x.classList.remove('on'));
  document.getElementById('p-'+p).classList.add('on');
  document.getElementById('n-'+p).classList.add('on');
  if(p==='relatorios') renderRelGeral();
}

function renderTurmaSelect(){
  const el=document.getElementById('turma-sel');
  el.innerHTML='<option value="">— Selecionar Turma —</option>';
  S.turmas.forEach(t=>{
    const o=document.createElement('option'); o.value=t.id; o.textContent=t.nome;
    if(t.id===S.turmaId) o.selected=true;
    el.appendChild(o);
  });
}

function trocarTurma(){
  S.turmaId=document.getElementById('turma-sel').value;
  renderAlunos(); renderProvaTree(); save();
}

function renderAlunos(){
  const el=document.getElementById('aluno-list');
  const list = S.alunos.filter(a=>a.turmaId===S.turmaId);
  el.innerHTML = list.map(a=>`<div class="st-row" onclick="S.alunoId='${a.id}';abrirCorrecao();">${a.nome}</div>`).join('');
}

function renderProvaTree(){
  const el=document.getElementById('prova-tree');
  const list = S.provas.filter(p=>p.turmaId===S.turmaId);
  el.innerHTML = list.map(p=>`<div class="st-row" onclick="S.provaId='${p.id}';abrirCorrecao();">${p.nome}</div>`).join('');
}

function renderRelGeral(){
  const el=document.getElementById('tp-geral');
  const cs = S.correcoes.filter(c=>c.turmaId===S.turmaId);
  const al = S.alunos.filter(a=>a.turmaId===S.turmaId);
  el.innerHTML = `
    <div style="display:flex; gap:20px; margin-bottom:20px;">
      <div class="card" style="flex:1; text-align:center;"><h3>${al.length}</h3><p>Alunos</p></div>
      <div class="card" style="flex:1; text-align:center;"><h3>${cs.length}</h3><p>Correções</p></div>
    </div>
    <div class="card">
      <h3>Ranking</h3>
      <table style="width:100%; border-collapse:collapse;">
        ${al.map(a=>`<tr><td style="padding:10px; border-bottom:1px solid #eee;">${a.nome}</td></tr>`).join('')}
      </table>
    </div>`;
}

function abrirCorrecao(){
  if(!S.alunoId || !S.provaId) return;
  document.getElementById('no-sel').style.display='none';
  document.getElementById('corr-content').style.display='block';
  document.getElementById('result-wrap').innerHTML = `<h3>Correção em andamento...</h3>`;
}

function openModal(id){ document.getElementById(id).classList.add('on'); }
function closeModal(id){ document.getElementById(id).classList.remove('on'); }

renderTurmaSelect();
renderAlunos();
renderProvaTree();
</script>
</body>
</html>
