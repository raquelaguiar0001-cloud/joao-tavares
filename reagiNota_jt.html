<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReagiNota — UE João Tavares da Costa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
 
const firebaseConfig = {
 apiKey: "AIzaSyCHR8cuC25TCDyZJNkV2R_04oTdUSdVAyk",
 authDomain: "corretor-gabarito.firebaseapp.com",
 databaseURL: "https://corretor-gabarito-default-rtdb.firebaseio.com",
 projectId: "corretor-gabarito",
 storageBucket: "corretor-gabarito.firebasestorage.app",
 messagingSenderId: "823312147686",
 appId: "1:823312147686:web:196d3492a3a37d8a460727"
};
 
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
 
const NAMESPACE = 'joaotavares_v2';
 
window._jt_save = async (data) => { await set(ref(db, NAMESPACE), data); };
window._jt_load = async () => {
 const snap = await get(ref(db, NAMESPACE));
 return snap.exists() ? snap.val() : null;
};
window._jt_listen = (cb) => {
 onValue(ref(db, NAMESPACE), snap => { if (snap.exists()) cb(snap.val()); });
};
window._jt_ready = true;
document.dispatchEvent(new Event('jt_firebase_ready'));
</script>
<style>
:root {
 --ink: #161616; --ink2: #5a5a6a; --ink3: #9898a8;
 --paper: #f8f7f4; --paper2: #efede8; --paper3: #e5e2db;
 --line: #dddad4; --blue: #2752e8; --blue-bg: #eef1fd;
 --green: #1a7a4a; --green-bg: #e6f4ed;
 --red: #c8202e; --red-bg: #fdedef;
 --amber: #a06020; --amber-bg: #fdf3e7;
 --r: 10px; --sh: 0 1px 4px rgba(0,0,0,.07), 0 4px 20px rgba(0,0,0,.06);
}
 
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
/* AJUSTE DE SCROLL: Permitir rolagem global se necessário */
html { height: 100%; overflow: auto; }
body {
 font-family: 'DM Sans', sans-serif;
 background: var(--paper);
 color: var(--ink);
 min-height: 100%;
 display: flex;
 flex-direction: column;
}
 
.topbar {
 height: 54px; background: var(--ink); color: #fff;
 display: flex; align-items: center; padding: 0 20px;
 gap: 16px; flex-shrink: 0; z-index: 100;
 box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.tb-logo { display: flex; align-items: center; gap: 10px; }
.tb-mark { width: 32px; height: 32px; background: #e63946; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-weight: 700; color: #fff; }
.tb-name { font-weight: 800; font-size: 1rem; }
.tb-nav { display: flex; gap: 2px; }
.tb-btn { background: transparent; border: none; color: rgba(255,255,255,.55); padding: 6px 14px; border-radius: 7px; cursor: pointer; font-family: inherit; font-size: .82rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.tb-btn.on { background: #e63946; color: #fff; }
.tb-turma { margin-left: auto; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); color: #fff; padding: 5px 12px; border-radius: 7px; font-size: .8rem; cursor: pointer; min-width: 200px; font-family: inherit; }
 
.body { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 270px; background: #fff; border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; }
.sb-sec { padding: 14px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
.sb-sec:last-child { flex: 1; border-bottom: none; }
.sb-head { display: flex; align-items: center; justify-content: space-between; font-size: .67rem; font-weight: 800; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }
.sb-scroll { overflow-y: auto; flex: 1; padding: 4px 0; }
 
/* ÁREA PRINCIPAL COM SCROLL LIBERADO */
.main { flex: 1; overflow-y: auto; background: var(--paper); padding-bottom: 40px; }
.page { display: none; padding: 26px 28px; }
.page.on { display: block; }
 
.btn { border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 700; font-size: .82rem; padding: 9px 16px; display: inline-flex; align-items: center; gap: 7px; transition: 0.15s; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-ghost { background: var(--paper2); color: var(--ink2); border: 1px solid var(--line); }
 
.card { background: #fff; border: 1px solid var(--line); border-radius: var(--r); padding: 20px; box-shadow: var(--sh); margin-bottom: 16px; }
.st-row { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: .82rem; border-left: 3px solid transparent; }
.st-row.on { background: var(--blue-bg); border-left-color: var(--blue); }
.st-av { width: 30px; height: 30px; border-radius: 50%; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 800; flex-shrink: 0; }
 
.empty { text-align: center; padding: 40px 20px; color: var(--ink3); }
.empty .ei { font-size: 2.4rem; margin-bottom: 10px; opacity: .35; }
 
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: none; align-items: center; justify-content: center; padding: 16px; }
.overlay.on { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 26px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
 
.gabarito-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.q-cell { background: var(--paper); border: 1.5px solid var(--line); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-size: .82rem; }
.q-num { width: 24px; height: 24px; border-radius: 50%; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; }
.q-cell.acerto { background: var(--green-bg); border-color: #a8d5bc; }
.q-cell.erro { background: var(--red-bg); border-color: #f4b8be; }
 
.nota-display { background: var(--ink); color: #fff; border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 20px; }
.nota-val { font-size: 3.5rem; font-weight: 800; font-family: 'DM Mono', monospace; }
 
.rank-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--paper); border-radius: 8px; margin-bottom: 6px; font-size: .83rem; }
.rank-pos { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .72rem; flex-shrink: 0; }
 
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: .82rem; z-index: 9999; transition: 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
 
<div class="topbar">
 <div class="tb-logo"><div class="tb-mark">⚗️</div><div class="tb-name">ReagiNota</div></div>
 <div class="tb-sep"></div>
 <div class="tb-nav">
 <button class="tb-btn on" onclick="nav('correcao')" id="n-correcao">📋 Correção</button>
 <button class="tb-btn" onclick="nav('turmas')" id="n-turmas">🏫 Turmas</button>
 <button class="tb-btn" onclick="nav('organizar')" id="n-organizar">📂 Organizar</button>
 <button class="tb-btn" onclick="nav('relatorios')" id="n-relatorios">📊 Relatórios</button>
 </div>
 <select class="tb-turma" id="turma-sel" onchange="trocarTurma()">
 <option value="">— Selecionar Turma —</option>
 </select>
</div>
 
<div class="body">
 <div class="sidebar">
 <div class="sb-sec" style="flex:0 0 auto">
 <div class="sb-head">Provas <button class="btn btn-xs btn-blue" onclick="openModal('m-nova-prova')">+ Nova</button></div>
 <div id="prova-tree" class="sb-scroll" style="max-height:180px"></div>
 </div>
 <div class="sb-sec">
 <div class="sb-head">Alunos <button class="btn btn-xs btn-blue" onclick="openModal('m-lista-alunos')">📋 Lista</button></div>
 <input type="text" placeholder="🔍 Buscar aluno..." style="width:100%; padding:8px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;" oninput="renderAlunos(this.value)">
 <div id="aluno-list" class="sb-scroll"></div>
 </div>
 </div>
 
 <div class="main">
 <div id="p-correcao" class="page on">
 <div id="no-sel" class="empty" style="margin-top:80px">
 <div class="ei">🎯</div>
 <div style="font-weight:800;font-size:1rem;margin-bottom:7px">Selecione prova e aluno</div>
 <p style="max-width:300px;margin:0 auto;line-height:1.6">Escolha uma turma, selecione uma prova e clique num aluno.</p>
 </div>
 <div id="corr-content" style="display:none"></div>
 </div>
 
 <div id="p-turmas" class="page">
 <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
 <h2>🏫 Turmas</h2>
 <button class="btn btn-blue" onclick="openModal('m-nova-turma')">+ Nova Turma</button>
 </div>
 <div id="turmas-list"></div>
 </div>
 
 <div id="p-organizar" class="page">
 <h2>📂 Gerenciar Dados</h2>
 <div class="card" style="margin-top:20px;">
 <h3>Provas da Turma</h3>
 <div id="org-provas-list"></div>
 </div>
 <div class="card">
 <h3>Alunos da Turma</h3>
 <div id="org-alunos-list"></div>
 </div>
 </div>
 
 <div id="p-relatorios" class="page">
 <h2>📊 Relatórios de Desempenho</h2>
 <div id="rel-content" style="margin-top:20px;"></div>
 </div>
 </div>
</div>
 
<div class="overlay" id="m-nova-turma"><div class="modal"><h3>Nova Turma</h3><input type="text" id="t-nome" placeholder="Nome da Turma" style="margin:20px 0; width:100%; padding:10px;"><button class="btn btn-blue" onclick="criarTurma()">Criar</button></div></div>
<div class="overlay" id="m-nova-prova"><div class="modal"><h3>Nova Prova</h3><input type="text" id="prova-nome" placeholder="Nome da Prova" style="margin-top:15px; width:100%; padding:10px;"><input type="number" id="prova-nq" placeholder="Nº de Questões" value="10" style="margin:10px 0; width:100%; padding:10px;"><div id="gabarito-campos"></div><button class="btn btn-ghost" onclick="gerarCamposGabarito()" id="btn-gerar-gab">Definir Gabarito</button><hr style="margin:15px 0;"><button class="btn btn-blue" onclick="criarProva()">Salvar Prova</button></div></div>
<div class="overlay" id="m-lista-alunos"><div class="modal"><h3>Importar Alunos</h3><textarea id="lista-nomes" placeholder="Cole os nomes, um por linha" rows="10" style="margin:15px 0; width:100%; padding:10px;"></textarea><button class="btn btn-blue" onclick="importarLista()">Importar</button></div></div>
<div class="overlay" id="m-edit-prova"><div class="modal modal-lg"><h3>✏️ Editar Prova</h3><div id="edit-prova-body"></div></div></div>
<div class="toast" id="toast"></div>
 
<script>
const JT_KEY = 'reaginota_joaotavares_v2';
let S = { turmas: [], provas: [], alunos: [], correcoes: [], turmaId: null, provaId: null, alunoId: null };
 
function save() { localStorage.setItem(JT_KEY, JSON.stringify(S)); if(window._jt_save) window._jt_save(S); }
function load() { const raw = localStorage.getItem(JT_KEY); if (raw) S = JSON.parse(raw); }
load();
 
function nav(p) {
 document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
 document.querySelectorAll('.tb-btn').forEach(x => x.classList.remove('on'));
 document.getElementById('p-' + p).classList.add('on');
 document.getElementById('n-' + p).classList.add('on');
 if(p === 'turmas') renderTurmasPage();
 if(p === 'organizar') renderOrganizar();
 if(p === 'relatorios') renderRelatorios();
}
 
function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function uid() { return 'jt_' + Date.now(); }
function openModal(id) { document.getElementById(id).classList.add('on'); if(id==='m-nova-prova') document.getElementById('btn-gerar-gab').style.display='block'; }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.overlay').forEach(ov => ov.onclick = e => { if(e.target===ov) closeModal(ov.id); });
 
// TURMAS
function criarTurma() { const n = document.getElementById('t-nome').value; if(!n) return; S.turmas.push({id: uid(), nome: n}); save(); renderTurmaSelect(); renderTurmasPage(); closeModal('m-nova-turma'); toast("Turma criada!"); }
function renderTurmaSelect() { const sel = document.getElementById('turma-sel'); sel.innerHTML = '<option value="">— Selecionar Turma —</option>'; S.turmas.forEach(t => { sel.innerHTML += `<option value="${t.id}" ${S.turmaId === t.id ? 'selected' : ''}>${t.nome}</option>`; }); }
function trocarTurma() { S.turmaId = document.getElementById('turma-sel').value; S.provaId = null; S.alunoId = null; renderAlunos(); renderProvaTree(); save(); limparCorrecao(); }
function renderTurmasPage() { document.getElementById('turmas-list').innerHTML = S.turmas.map(t => `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span><b>${t.nome}</b></span><button class="btn btn-red btn-xs" onclick="excluirTurma('${t.id}')">Excluir</button></div>`).join(''); }
function excluirTurma(id) { if(!confirm("Excluir turma?")) return; S.turmas = S.turmas.filter(t => t.id !== id); S.alunos = S.alunos.filter(a => a.turmaId !== id); if(S.turmaId === id) S.turmaId = null; save(); renderTurmaSelect(); renderTurmasPage(); }
 
// PROVAS
function gerarCamposGabarito() {
 const nq = document.getElementById('prova-nq').value;
 document.getElementById('gabarito-campos').innerHTML = '<div class="gabarito-grid">' + Array.from({length: nq}, (_, i) => `<div class="q-cell"><span class="q-num">${i+1}</span><select id="gab-${i+1}"><option value="">-</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option></select></div>`).join('') + '</div>';
 document.getElementById('btn-gerar-gab').style.display = 'none';
}
function criarProva() {
 if(!S.turmaId) return alert("Selecione uma turma!");
 const nome = document.getElementById('prova-nome').value;
 const nq = document.getElementById('prova-nq').value;
 const gab = {}; for(let i=1; i<=nq; i++) gab[i] = document.getElementById('gab-'+i)?.value || "";
 S.provas.push({id: uid(), turmaId: S.turmaId, nome, nq, gabarito: gab});
 save(); renderProvaTree(); closeModal('m-nova-prova'); toast("Prova salva!");
}
function renderProvaTree() { const div = document.getElementById('prova-tree'); const provas = S.provas.filter(p => p.turmaId === S.turmaId); div.innerHTML = provas.map(p => `<div class="st-row ${S.provaId === p.id ? 'on' : ''}" onclick="selProva('${p.id}')"><span>📋 ${p.nome}</span></div>`).join(''); }
function selProva(id) { S.provaId = id; renderProvaTree(); if(S.alunoId) abrirCorrecao(); save(); }
 
// ALUNOS
function importarLista() { if(!S.turmaId) return alert("Selecione uma turma!"); const nomes = document.getElementById('lista-nomes').value.split('\n'); nomes.forEach(n => { if(n.trim()) S.alunos.push({id: uid()+Math.random(), turmaId: S.turmaId, nome: n.trim()}); }); save(); renderAlunos(); closeModal('m-lista-alunos'); }
function renderAlunos(q = '') { const div = document.getElementById('aluno-list'); const alunos = S.alunos.filter(a => a.turmaId === S.turmaId && a.nome.toLowerCase().includes(q.toLowerCase())); div.innerHTML = alunos.map(a => `<div class="st-row ${S.alunoId === a.id ? 'on' : ''}" onclick="selAluno('${a.id}')"><div class="st-av">${a.nome[0]}</div><span>${a.nome}</span></div>`).join(''); }
function selAluno(id) { S.alunoId = id; renderAlunos(); abrirCorrecao(); save(); }
 
// CORREÇÃO
function limparCorrecao() { document.getElementById('no-sel').style.display = 'block'; document.getElementById('corr-content').style.display = 'none'; }
function abrirCorrecao() {
 if(!S.alunoId || !S.provaId) return;
 const aluno = S.alunos.find(a => a.id === S.alunoId);
 const prova = S.provas.find(p => p.id === S.provaId);
 document.getElementById('no-sel').style.display = 'none';
 const div = document.getElementById('corr-content'); div.style.display = 'block';
 const corr = S.correcoes.find(c => c.alunoId === S.alunoId && c.provaId === S.provaId) || {respostas: {}};
 
 // LÓGICA DE ALTERNATIVAS DINÂMICAS:
 const gabValores = Object.values(prova.gabarito);
 const opcoes = gabValores.includes('E') ? ['A','B','C','D','E'] : ['A','B','C','D'];
 
 div.innerHTML = `<div class="card"><h3>${aluno.nome}</h3><p>${prova.nome}</p><div class="gabarito-grid" style="margin-top:20px;">` + 
 Array.from({length: prova.nq}, (_, i) => {
 const q = i+1; const resp = corr.respostas[q] || ""; const gab = prova.gabarito[q];
 let cor = resp ? (resp === gab ? "acerto" : "erro") : "";
 return `<div class="q-cell ${cor}"><span class="q-num">${q}</span><select onchange="salvarResposta(${q}, this.value)"><option value="">-</option>${opcoes.map(l => `<option ${resp === l ? 'selected':''}>${l}</option>`).join('')}</select></div>`;
 }).join('') + `</div><button class="btn btn-blue" style="margin-top:20px;" onclick="calcularNota()">Calcular Nota</button></div><div id="result-nota"></div>`;
}
function salvarResposta(q, v) { 
 let corr = S.correcoes.find(c => c.alunoId === S.alunoId && c.provaId === S.provaId);
 if(!corr) { corr = {id: uid(), alunoId: S.alunoId, provaId: S.provaId, turmaId: S.turmaId, respostas: {}}; S.correcoes.push(corr); }
 corr.respostas[q] = v; save(); abrirCorrecao(); 
}
function calcularNota() {
 const prova = S.provas.find(p => p.id === S.provaId);
 const corr = S.correcoes.find(c => c.alunoId === S.alunoId && c.provaId === S.provaId);
 if(!corr) return;
 let acertos = 0; for(let q in prova.gabarito) if(prova.gabarito[q] === corr.respostas[q]) acertos++;
 const nota = (acertos / prova.nq) * 10; corr.nota = nota; save();
 document.getElementById('result-nota').innerHTML = `<div class="nota-display"><div class="nota-val">${nota.toFixed(1)}</div><p>${acertos} acertos de ${prova.nq}</p></div>`;
 renderAlunos();
}
 
// ORGANIZAR & RELATÓRIOS
function renderOrganizar() {
 const pDiv = document.getElementById('org-provas-list');
 const aDiv = document.getElementById('org-alunos-list');
 const provas = S.provas.filter(p => p.turmaId === S.turmaId);
 const alunos = S.alunos.filter(a => a.turmaId === S.turmaId);
 
 pDiv.innerHTML = provas.map(p => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>📋 ${p.nome}</span><div><button class="btn btn-ghost btn-xs" onclick="editarProva('${p.id}')">✏️ Gabarito</button> <button class="btn btn-red btn-xs" onclick="excluirProva('${p.id}')">🗑️</button></div></div>`).join('');
 aDiv.innerHTML = alunos.map(a => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;"><span>${a.nome}</span><button class="btn btn-red btn-xs" onclick="excluirAluno('${a.id}')">Excluir</button></div>`).join('');
}
function excluirAluno(id) { S.alunos = S.alunos.filter(a => a.id !== id); save(); renderOrganizar(); renderAlunos(); }
function excluirProva(id) { S.provas = S.provas.filter(p => p.id !== id); save(); renderOrganizar(); renderProvaTree(); }
 
function editarProva(id) {
 const p = S.provas.find(x => x.id === id); if(!p) return;
 const body = document.getElementById('edit-prova-body');
 body.innerHTML = `<input type="text" id="ep-nome" value="${p.nome}" style="width:100%; padding:10px; margin-bottom:10px;"><div class="gabarito-grid">` + 
 Array.from({length: p.nq}, (_, i) => `<div class="q-cell"><span class="q-num">${i+1}</span><select id="ep-gab-${i+1}"><option value="">-</option><option ${p.gabarito[i+1]==='A'?'selected':''}>A</option><option ${p.gabarito[i+1]==='B'?'selected':''}>B</option><option ${p.gabarito[i+1]==='C'?'selected':''}>C</option><option ${p.gabarito[i+1]==='D'?'selected':''}>D</option><option ${p.gabarito[i+1]==='E'?'selected':''}>E</option></select></div>`).join('') + 
 `</div><button class="btn btn-blue" style="margin-top:20px; width:100%" onclick="salvarEdicaoProva('${id}')">Salvar Alterações</button>`;
 openModal('m-edit-prova');
}
function salvarEdicaoProva(id) {
 const p = S.provas.find(x => x.id === id);
 p.nome = document.getElementById('ep-nome').value;
 for(let i=1; i<=p.nq; i++) p.gabarito[i] = document.getElementById('ep-gab-'+i).value;
 save(); renderOrganizar(); renderProvaTree(); closeModal('m-edit-prova'); toast("Gabarito atualizado!");
}
 
function renderRelatorios() {
 const div = document.getElementById('rel-content');
 if(!S.turmaId) return div.innerHTML = "<p>Selecione uma turma.</p>";
 const corrs = S.correcoes.filter(c => S.turmaId === c.turmaId || S.alunos.find(a => a.id === c.alunoId && a.turmaId === S.turmaId));
 if(!corrs.length) return div.innerHTML = "<p>Nenhuma nota lançada.</p>";
 div.innerHTML = `<div class="card"><table style="width:100%; text-align:left;"><thead><tr><th>Aluno</th><th>Nota</th></tr></thead><tbody>` + 
 corrs.map(c => { const a = S.alunos.find(al => al.id === c.alunoId); return `<tr><td>${a?.nome || 'Excluído'}</td><td><b>${c.nota?.toFixed(1) || '0.0'}</b></td></tr>`; }).join('') + `</tbody></table></div>`;
}
 
function stringToColor(str) { let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash); const c = (hash & 0x00FFFFFF).toString(16).toUpperCase(); return "#" + "00000".substring(0, 6 - c.length) + c; }

renderTurmaSelect(); renderAlunos(); renderProvaTree();
document.addEventListener('jt_firebase_ready', () => { window._jt_load().then(d => { if(d) { S = d; renderTurmaSelect(); renderAlunos(); renderProvaTree(); } }); });
