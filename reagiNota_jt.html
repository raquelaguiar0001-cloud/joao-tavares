<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReagiNota — UE João Tavares da Costa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCHR8cuC25TCDyZJNkV2R_04oTdUSdVAyk",
  authDomain: "corretor-gabarito.firebaseapp.com",
  databaseURL: "https://corretor-gabarito-default-rtdb.firebaseio.com",
  projectId: "corretor-gabarito",
  storageBucket: "corretor-gabarito.firebasestorage.app",
  messagingSenderId: "823312147686",
  appId: "1:823312147686:web:196d3492a3a37d8a460727"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const NAMESPACE = 'escola_joaotavares_da_costa_v1';
const LS_KEY    = 'rn_joaotavares_da_costa_v1';

window._jt_save   = async (data) => { await set(ref(db, NAMESPACE), data); };
window._jt_load   = async () => { const s = await get(ref(db,NAMESPACE)); return s.exists()?s.val():null; };
window._jt_listen = (cb) => { onValue(ref(db,NAMESPACE), s=>{ if(s.exists()) cb(s.val()); }); };
window._JT_LS_KEY = LS_KEY;
window._jt_ready  = true;
document.dispatchEvent(new Event('jt_firebase_ready'));
</script>
<style>
:root {
  --ink:#161616; --ink2:#5a5a6a; --ink3:#9898a8;
  --paper:#f8f7f4; --paper2:#efede8; --paper3:#e5e2db;
  --line:#dddad4; --blue:#2752e8; --blue-bg:#eef1fd;
  --green:#1a7a4a; --green-bg:#e6f4ed;
  --red:#c8202e; --red-bg:#fdedef;
  --r:10px; --sh:0 1px 4px rgba(0,0,0,.07),0 4px 20px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;}
.topbar{height:54px;background:var(--ink);color:#fff;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:200;}
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-mark{width:32px;height:32px;background:#e63946;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:700;color:#fff;font-size:.9rem;}
.tb-name{font-weight:800;font-size:.95rem;}
.tb-school{font-size:.68rem;color:rgba(255,255,255,.4);flex-shrink:0;}
.tb-nav{display:flex;gap:2px;flex-shrink:0;}
.tb-btn{background:transparent;border:none;color:rgba(255,255,255,.55);padding:6px 11px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;transition:.15s;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.tb-btn.on{background:#e63946;color:#fff;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition:.3s;}
.sync-dot.ok{background:#1a7a4a;}
.sync-dot.err{background:#c8202e;}
.sync-dot.saving{background:#c97a00;animation:pulse .6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.turma-dropdown{margin-left:auto;position:relative;min-width:200px;flex-shrink:0;}
.turma-trigger{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#e63946;border:none;color:#fff;padding:7px 13px;border-radius:8px;font-size:.82rem;font-weight:700;font-family:inherit;cursor:pointer;width:100%;transition:.15s;box-shadow:0 2px 8px rgba(230,57,70,.4);}
.turma-trigger.open .caret{transform:rotate(180deg);}
.turma-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:240px;background:#fff;border-radius:10px;border:1px solid var(--line);box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:999;overflow:hidden;max-height:320px;overflow-y:auto;}
.turma-menu.open{display:block;}
.turma-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:.82rem;color:var(--ink);transition:.12s;border-bottom:1px solid var(--line);}
.turma-opt.selected{background:var(--blue-bg);color:var(--blue);font-weight:700;}
.body{display:flex;flex:1;overflow:hidden;min-height:0;}
.sidebar{width:260px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sb-sec{padding:12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;}
.sb-sec-flex{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.sb-head{display:flex;align-items:center;justify-content:space-between;font-size:.65rem;font-weight:800;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;letter-spacing:.05em;}
.sb-scroll{overflow-y:auto;flex:1;}
.main{flex:1;overflow-y:auto;padding:20px;background:var(--paper);}
.page{display:none;}.page.on{display:block;}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--sh);margin-bottom:12px;}
.st-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:.8rem;border-left:3px solid transparent;transition:.15s;}
.st-row.on{background:var(--blue-bg);border-left-color:var(--blue);}
.btn{border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.75rem;padding:7px 12px;display:inline-flex;align-items:center;gap:5px;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-ghost{background:var(--paper2);color:var(--ink2);border:1px solid var(--line);}
.btn-xs{padding:4px 8px;font-size:.7rem;}
.gabarito-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px;}
.q-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:8px;background:#fff;border:1px solid var(--line);}
.q-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0;}
.bubble{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--ink2);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;cursor:pointer;}
.bubble.selected{background:var(--ink);color:#fff;border-color:var(--ink);}
.q-row.acerto{border-color:var(--green);background:var(--green-bg);}
.q-row.acerto .q-num{background:var(--green);}
.q-row.erro{border-color:var(--red);background:var(--red-bg);}
.q-row.erro .q-num{background:var(--red);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal input, .modal select, .modal textarea {width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:7px;margin-bottom:10px;font-family:inherit;}
.rel-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.rel-table th{background:var(--ink);color:#fff;padding:8px 10px;text-align:left;}
.rel-table td{padding:7px 10px;border-bottom:1px solid var(--line);}
.badge{padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-red{background:var(--red-bg);color:var(--red);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:.8rem;z-index:1000;opacity:0;transition:.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo"><div class="tb-mark">RN</div><div class="tb-name">ReagiNota</div></div>
  <span class="tb-school">UE João Tavares da Costa</span>
  <div class="tb-nav">
    <button class="tb-btn on" onclick="nav('correcao')" id="n-correcao">📋 Correção</button>
    <button class="tb-btn" onclick="nav('turmas')" id="n-turmas">🏫 Turmas</button>
    <button class="tb-btn" onclick="nav('relatorio')" id="n-relatorio">📊 Relatório</button>
    <button class="tb-btn" onclick="nav('organizar')" id="n-organizar">📂 Organizar</button>
  </div>
  <div style="display:flex;align-items:center;gap:5px;font-size:.62rem;color:rgba(255,255,255,.45)">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">—</span>
  </div>
  <div class="turma-dropdown" id="turma-dropdown">
    <button class="turma-trigger" onclick="toggleTurmaMenu()"><span id="turma-label">— Selecionar Turma —</span><span class="caret">▼</span></button>
    <div class="turma-menu" id="turma-menu"></div>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sb-head">Provas <button class="btn btn-xs btn-blue" onclick="abrirNovaProva()">+ Nova</button></div>
      <div id="prova-tree" class="sb-scroll" style="max-height:160px"></div>
    </div>
    <div class="sb-sec sb-sec-flex">
      <div class="sb-head">Alunos <button class="btn btn-xs btn-blue" onclick="openModal('m-lista-alunos')">Lista</button></div>
      <div id="aluno-list" class="sb-scroll"></div>
    </div>
  </div>

  <div class="main">
    <div id="p-correcao" class="page on">
      <div id="corr-header"></div>
      <div id="corr-grid" class="gabarito-grid"></div>
      <div id="result-nota" style="margin-top:15px;max-width:280px"></div>
    </div>
    <div id="p-turmas" class="page">
        <h2 style="font-size:1.1rem;margin-bottom:16px">🏫 Turmas</h2>
        <div id="turmas-list"></div>
        <button class="btn btn-blue" onclick="openModal('m-nova-turma')">+ Nova Turma</button>
    </div>
    <div id="p-relatorio" class="page">
        <select id="rel-prova-sel" onchange="renderRelatorio()"></select>
        <button class="btn btn-ghost" onclick="exportarCSV()">⬇️ CSV</button>
        <div id="rel-content" style="margin-top:15px"></div>
    </div>
    <div id="p-organizar" class="page"><div id="org-content"></div></div>
  </div>
</div>

<div class="overlay" id="m-prova"><div class="modal">
  <h3 id="prova-modal-titulo">📋 Prova</h3>
  <input type="text" id="prova-nome" placeholder="Nome da Prova">
  <div style="display:flex;gap:8px">
    <div style="flex:1"><label style="font-size:.7rem">QUESTÕES</label><input type="number" id="prova-nq" value="10"></div>
    <div style="flex:1"><label style="font-size:.7rem">VALOR (0-10)</label><input type="number" id="prova-valor" value="10" step="0.5"></div>
  </div>
  <select id="prova-alts"><option value="4">A B C D</option><option value="5">A B C D E</option></select>
  <button class="btn btn-ghost" onclick="gerarSetupGab(false)">🔧 Definir Gabarito</button>
  <div id="gabarito-setup" style="max-height:200px;overflow-y:auto;margin:10px 0;display:grid;gap:5px"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn btn-ghost" onclick="closeModal('m-prova')">Cancelar</button>
    <button class="btn btn-blue" onclick="salvarProva()">Salvar</button>
  </div>
</div></div>

<div class="overlay" id="m-nova-turma"><div class="modal">
    <h3>🏫 Nova Turma</h3>
    <input type="text" id="t-nome" placeholder="Nome da Turma">
    <button class="btn btn-blue" onclick="criarTurma()">Criar</button>
</div></div>

<div class="overlay" id="m-lista-alunos"><div class="modal">
    <h3>👥 Lista de Alunos</h3>
    <textarea id="lista-nomes" rows="8" placeholder="Um nome por linha"></textarea>
    <button class="btn btn-blue" onclick="importarLista()">Importar</button>
</div></div>

<div class="toast" id="toast"></div>

<script>
let S = { turmas:[], provas:[], alunos:[], correcoes:[], turmaId:null, provaId:null, alunoId:null };
let _isSyncing = false;

function save() {
  localStorage.setItem(window._JT_LS_KEY, JSON.stringify(S));
  setSyncStatus('saving');
  if (window._jt_save && !_isSyncing) {
    window._jt_save(S).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err'));
  }
}

function setSyncStatus(s) {
  const d=document.getElementById('sync-dot'), l=document.getElementById('sync-label');
  d.className='sync-dot '+s;
  l.textContent=s==='ok'?'Sincronizado':s==='saving'?'Enviando...':'Erro';
}

function nav(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tb-btn').forEach(x=>x.classList.remove('on'));
  document.getElementById('p-'+p).classList.add('on');
  document.getElementById('n-'+p).classList.add('on');
  if(p==='relatorio') { popularRelProvasSel(); renderRelatorio(); }
}

function toggleTurmaMenu(){ document.getElementById('turma-menu').classList.toggle('open'); }

function selecionarTurmaMenu(id){
  S.turmaId=id; S.provaId=null; S.alunoId=null;
  save(); renderTurmaSelect(); renderAlunos(); renderProvaTree();
  document.getElementById('turma-menu').classList.remove('open');
}

function renderTurmaSelect(){
  const menu=document.getElementById('turma-menu'), label=document.getElementById('turma-label');
  const cur=S.turmas.find(t=>t.id===S.turmaId);
  label.textContent = cur ? cur.nome : '— Selecionar Turma —';
  menu.innerHTML = S.turmas.map(t=>`<div class="turma-opt ${S.turmaId===t.id?'selected':''}" onclick="selecionarTurmaMenu('${t.id}')">${t.nome}</div>`).join('');
}

function abrirNovaProva(){
  window._tempGab={};
  document.getElementById('prova-nome').value='';
  document.getElementById('prova-nq').value='10';
  document.getElementById('prova-valor').value='10';
  document.getElementById('gabarito-setup').innerHTML='';
  openModal('m-prova');
}

function gerarSetupGab(manter){
  const n=parseInt(document.getElementById('prova-nq').value)||10;
  const alt=parseInt(document.getElementById('prova-alts').value);
  const ops=alt===5?['A','B','C','D','E']:['A','B','C','D'];
  document.getElementById('gabarito-setup').innerHTML=Array.from({length:n},(_,i)=>{
    const q=i+1; const current = window._tempGab[q] || '';
    return `<div class="q-row"><span>${q}</span>${ops.map(l=>`<div class="bubble ${current===l?'selected':''}" onclick="window._tempGab[${q}]='${l}';gerarSetupGab(true)">${l}</div>`).join('')}</div>`;
  }).join('');
}

function salvarProva(){
  const nome=document.getElementById('prova-nome').value;
  const nq=parseInt(document.getElementById('prova-nq').value);
  const valor=parseFloat(document.getElementById('prova-valor').value);
  if(!nome || !S.turmaId) return;
  S.provas.push({id:'p'+Date.now(), turmaId:S.turmaId, nome, nq, valor, gabarito:window._tempGab});
  save(); renderProvaTree(); closeModal('m-prova');
}

function renderProvaTree(){
  const div=document.getElementById('prova-tree');
  const provas=S.provas.filter(p=>p.turmaId===S.turmaId);
  div.innerHTML=provas.map(p=>`<div class="st-row ${S.provaId===p.id?'on':''}" onclick="S.provaId='${p.id}';save();renderProvaTree();abrirCorrecao()">${p.nome}</div>`).join('');
}

function renderAlunos(){
  const div=document.getElementById('aluno-list');
  const alunos=S.alunos.filter(a=>a.turmaId===S.turmaId);
  div.innerHTML=alunos.map(a=>`<div class="st-row ${S.alunoId===a.id?'on':''}" onclick="S.alunoId='${a.id}';save();renderAlunos();abrirCorrecao()">${a.nome}</div>`).join('');
}

function abrirCorrecao(){
  if(!S.alunoId || !S.provaId) return;
  const p=S.provas.find(x=>x.id===S.provaId), a=S.alunos.find(x=>x.id===S.alunoId);
  const corr=S.correcoes.find(c=>c.alunoId===S.alunoId && c.provaId===S.provaId) || {respostas:{}};
  document.getElementById('corr-header').innerHTML=`<b>${a.nome}</b><br><small>${p.nome} (Vale ${p.valor})</small>`;
  const alts=p.alts==5?['A','B','C','D','E']:['A','B','C','D'];
  document.getElementById('corr-grid').innerHTML=Array.from({length:p.nq},(_,i)=>{
    const q=i+1; const r=corr.respostas[q]||''; const g=p.gabarito[q]||'';
    const cls = r ? (r===g?'acerto':'erro') : '';
    return `<div class="q-row ${cls}"><span>${q}</span>${alts.map(l=>`<div class="bubble ${r===l?'selected':''}" onclick="salvarResp(${q},'${l}')">${l}</div>`).join('')} <small style="margin-left:auto">${g}</small></div>`;
  }).join('');
  calcNota();
}

function salvarResp(q,v){
  let c=S.correcoes.find(x=>x.alunoId===S.alunoId && x.provaId===S.provaId);
  if(!c){ c={alunoId:S.alunoId, provaId:S.provaId, turmaId:S.turmaId, respostas:{}}; S.correcoes.push(c); }
  c.respostas[q] = c.respostas[q]===v ? null : v;
  save(); abrirCorrecao();
}

function calcNota(){
  const p=S.provas.find(x=>x.id===S.provaId), c=S.correcoes.find(x=>x.alunoId===S.alunoId && x.provaId===S.provaId);
  if(!p || !c) return;
  let acertos=0; Object.keys(p.gabarito).forEach(q=>{ if(p.gabarito[q]===c.respostas[q]) acertos++; });
  const nota = (acertos / p.nq) * p.valor;
  document.getElementById('result-nota').innerHTML=`<div class="card" style="background:var(--blue);color:#fff;text-align:center"><h2>${nota.toFixed(1)}</h2><small>${acertos} acertos de ${p.nq}</small></div>`;
}

function popularRelProvasSel(){
    const s=document.getElementById('rel-prova-sel');
    s.innerHTML=S.provas.filter(p=>p.turmaId===S.turmaId).map(p=>`<option value="${p.id}">${p.nome}</option>`).join('');
}

function renderRelatorio(){
    const pid=document.getElementById('rel-prova-sel').value; if(!pid) return;
    const p=S.provas.find(x=>x.id===pid);
    const alunos=S.alunos.filter(a=>a.turmaId===S.turmaId);
    let html='<table class="rel-table"><tr><th>Aluno</th><th>Nota</th></tr>';
    alunos.forEach(a=>{
        const c=S.correcoes.find(x=>x.alunoId===a.id && x.provaId===pid);
        let ac=0; if(c) Object.keys(p.gabarito).forEach(q=>{if(p.gabarito[q]===c.respostas[q])ac++});
        const nota=c ? ((ac/p.nq)*p.valor).toFixed(1) : '-';
        html+=`<tr><td>${a.nome}</td><td>${nota}</td></tr>`;
    });
    document.getElementById('rel-content').innerHTML=html+'</table>';
}

function criarTurma(){
    const n=document.getElementById('t-nome').value; if(!n) return;
    S.turmas.push({id:'t'+Date.now(), nome:n}); save(); renderTurmaSelect(); closeModal('m-nova-turma');
}

function importarLista(){
    const txt=document.getElementById('lista-nomes').value;
    txt.split('\n').forEach(n=>{ if(n.trim()) S.alunos.push({id:'a'+Math.random(), turmaId:S.turmaId, nome:n.trim()}); });
    save(); renderAlunos(); closeModal('m-lista-alunos');
}

function openModal(id){document.getElementById(id).classList.add('on');}
function closeModal(id){document.getElementById(id).classList.remove('on');}

document.addEventListener('jt_firebase_ready', ()=>{
  window._jt_listen(data => {
    _isSyncing = true;
    S = data;
    renderTurmaSelect(); renderProvaTree(); renderAlunos();
    _isSyncing = false;
    setSyncStatus('ok');
  });
});

window.onload = () => {
    const local = localStorage.getItem(LS_KEY);
    if(local) { S = JSON.parse(local); renderTurmaSelect(); renderProvaTree(); renderAlunos(); }
};
</script>
</body>
</html>
