<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230a1a12'/><stop offset='1' stop-color='%230d2818'/></linearGradient><linearGradient id='liq' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%2352d68a'/><stop offset='1' stop-color='%231a7a4a'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23bg)'/><rect x='30' y='8' width='40' height='6' rx='3' fill='%232d6a4f'/><path d='M36 40 L20 70 Q15 82 26 87 L74 87 Q85 82 80 70 L64 40 Z' fill='%23ffffff' opacity='.07' stroke='%2352d68a' stroke-width='2.5'/><path d='M33 58 Q36 55 40 58 L22 80 Q17 87 28 88 L72 88 Q83 87 78 80 Z' fill='url(%23liq)' opacity='.92'/><circle cx='38' cy='71' r='4' fill='%23ffffff' opacity='.25'/><circle cx='30' cy='52' r='3' fill='%2352d68a' opacity='.7'/><circle cx='70' cy='48' r='2' fill='%23a8e6cf' opacity='.6'/></svg>"><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230f0f1a'/><stop offset='1' stop-color='%231a1a3e'/></linearGradient><linearGradient id='liq' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23ff6b6b'/><stop offset='1' stop-color='%23c8202e'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23bg)'/><rect x='30' y='8' width='40' height='6' rx='3' fill='%23e63946'/><path d='M36 40 L20 70 Q15 82 26 87 L74 87 Q85 82 80 70 L64 40 Z' fill='%23ffffff' opacity='.07' stroke='%236699ff' stroke-width='2.5'/><path d='M33 58 Q36 55 40 58 L22 80 Q17 87 28 88 L72 88 Q83 87 78 80 Z' fill='url(%23liq)' opacity='.92'/><circle cx='38' cy='71' r='4' fill='%23ffffff' opacity='.25'/><circle cx='30' cy='52' r='3' fill='%236699ff' opacity='.7'/><circle cx='70' cy='48' r='2' fill='%2366ffcc' opacity='.6'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejador — UE João Tavares da Costa</title>
    <style>
        :root { --primary: #cfd8dc; --card-bg: #ffffff; --text-dark: #263238; --header-bg: #546e7a; --accent: #ffccbc; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--primary); color: var(--text-dark); margin: 0; padding: 15px; line-height: 1.5; }
        .container { width: 100%; max-width: 1200px; margin: auto; }
        .top-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-turma-top { background: white; border: 1px solid #b0bec5; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--header-bg); transition: 0.2s; }
        .btn-turma-top.active { background: var(--header-bg); color: white; border-color: var(--header-bg); }
        .header-unidade { background: var(--header-bg); padding: 20px; border-radius: 15px; color: white; text-align: center; margin-bottom: 25px; box-shadow: var(--shadow); }
        .header-unidade h1 { margin: 0; font-size: 1.6rem; }
        .layout-principal { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
        .sidebar-schedule { background: #eceff1; padding: 20px; border-radius: 20px; border: 1px solid #b0bec5; box-shadow: var(--shadow); }
        .sidebar-schedule h3 { margin-top: 0; text-align: center; color: var(--header-bg); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .day-label { font-size: 0.75rem; font-weight: bold; color: var(--header-bg); margin-top: 15px; text-transform: uppercase; }
        .schedule-tag { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin-bottom: 8px; padding: 10px; border-radius: 8px; color: white; font-weight: 600; }
        .section-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid #cfd8dc; }
        .roteiro-item { background: #fff; border: 1px solid #cfd8dc; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .roteiro-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; font-weight: bold; }
        .roteiro-content { display: none; padding: 15px; border-top: 1px solid #eee; background: #fff; }
        .roteiro-item.open .roteiro-content { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #cfd8dc; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        .btn-main { background-color: var(--header-bg); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        .row-compacta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-badge { background: var(--header-bg); color: white; padding: 3px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-right: 10px; }
        .subtopico-view { display: flex; align-items: center; gap: 10px; padding: 8px; background: #f1f8e9; border-radius: 8px; margin-top: 5px; font-size: 0.9rem; border: 1px solid #dcedc8; cursor: pointer; }
        .subtopico-view.checked { background: #f8f9fa; border-color: #e0e0e0; color: #9e9e9e; text-decoration: line-through; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 550px; }
        @media(max-width:700px){.layout-principal{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div class="top-nav" id="turmaGrid"></div>
    <div class="header-unidade">
        <h1>João Tavares da Costa</h1>
        <p>Planejamento Semanal - Raquel Aguiar</p>
    </div>
    <div class="layout-principal">
        <div class="sidebar-schedule">
            <h3>📅 Quadro da Semana</h3>
            <div id="homeDaysGrid"></div>
        </div>
        <div id="painelTurma" style="display:none;">
            <div class="section-card">
                <h3 style="margin-top:0">✍️ Novo Planejamento</h3>
                <div class="row-compacta">
                    <input type="text" id="dataInput" placeholder="Data (DD/MM/AAAA)" maxlength="10" onkeyup="mascaraData(this)">
                    <input type="text" id="aulaInput" placeholder="Aula">
                </div>
                <textarea id="textoPrincipal" placeholder="O que será trabalhado?"></textarea>
                <button class="btn-main" onclick="salvarNovo()">💾 Salvar Planejamento</button>
            </div>
            <div id="listaHistorico"></div>
        </div>
    </div>
</div>

<div id="modalEdicao" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--header-bg)">Editar Registro</h3>
        <div class="row-compacta"><input type="text" id="editData" onkeyup="mascaraData(this)" maxlength="10"><input type="text" id="editAula"></div>
        <textarea id="editTitulo"></textarea>
        <div id="areaSubtopicosEdit"></div>
        <button style="width:100%;margin-top:10px;padding:8px;cursor:pointer;" onclick="adicionarLinhaSubtopico()">+ Novo Tópico</button>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn-main" onclick="salvarAlteracoes()">💾 Atualizar</button><button class="btn-main" style="background:#90a4ae" onclick="fecharModal()">Sair</button></div>
        <button onclick="excluirRegistro()" style="width:100%;background:none;border:none;color:#d32f2f;cursor:pointer;margin-top:20px;font-weight:bold;">🗑️ EXCLUIR</button>
    </div>
</div>

<script>
    const URL_FIREBASE = "https://ue-joao-tavares-da-costa-default-rtdb.firebaseio.com/joaotavares_data.json";
    const CORES = { "6º ano": "#546e7a", "7º ano": "#78909c", "8º ano": "#8d6e63", "9º ano": "#6d4c41" };
    let banco = {}; let turmaAtiva = ""; let indexEditando = null;
    let idsAbertos = new Set();

    async function carregar() {
        const res = await fetch(URL_FIREBASE);
        banco = await res.json() || {};
        renderizarTurmas(); renderizarHome();
        if(turmaAtiva) renderizarHistorico();
    }

    setInterval(() => { if(document.getElementById('modalEdicao').style.display !== 'flex') carregar(); }, 5000);

    function mascaraData(i) {
        let v = i.value.replace(/\D/g, "");
        if(v.length > 2 && v.length <= 4) v = v.substring(0,2) + "/" + v.substring(2);
        else if(v.length > 4) v = v.substring(0,2) + "/" + v.substring(2,4) + "/" + v.substring(4,8);
        i.value = v;
    }

    function renderizarTurmas() {
        const grid = document.getElementById('turmaGrid'); grid.innerHTML = '';
        ["6º ano","7º ano","8º ano","9º ano"].forEach(nome => {
            const id = `JT_${nome.replace(/\s/g,'_')}`;
            const btn = document.createElement('button');
            btn.className = `btn-turma-top ${turmaAtiva===id?'active':''}`;
            btn.innerText = nome;
            btn.onclick = () => { turmaAtiva=id; idsAbertos.clear(); document.getElementById('painelTurma').style.display='block'; renderizarTurmas(); renderizarHistorico(); };
            grid.appendChild(btn);
        });
    }

    function renderizarHome() {
        const grid = document.getElementById('homeDaysGrid'); grid.innerHTML = '';
        ["Quinta","Sexta"].forEach(dia => {
            let html = `<div class="day-label">${dia}</div>`;
            let aulas = [];
            ["6º ano","7º ano","8º ano","9º ano"].forEach(nome => {
                const id = `JT_${nome.replace(/\s/g,'_')}`;
                (banco[id]?.horários?.[dia] || []).forEach(a => { if(a.trim()) aulas.push({h:a,t:nome}); });
            });
            aulas.sort((a,b)=>(parseInt(a.h)||0)-(parseInt(b.h)||0)).forEach(item => { html += `<div class="schedule-tag" style="background:${CORES[item.t]}">${item.h} - ${item.t}</div>`; });
            grid.innerHTML += html;
        });
    }

    function gerenciarAbertura(idx, elemento) {
        if(idsAbertos.has(idx)){idsAbertos.delete(idx);elemento.classList.remove('open');}
        else{idsAbertos.add(idx);elemento.classList.add('open');}
    }

    function renderizarHistorico() {
        const lista = document.getElementById('listaHistorico');
        lista.innerHTML = '<h3>📚 Histórico de Planejamento</h3>';
        if(!banco[turmaAtiva]?.roteiros) return;
        banco[turmaAtiva].roteiros.forEach((r, idx) => {
            let subs = (r.subtopicos||[]).map((s,sIdx) => {
                const isChecked = typeof s==='object' ? s.feito : false;
                const texto = typeof s==='object' ? s.texto : s;
                return `<div class="subtopico-view ${isChecked?'checked':''}" onclick="event.stopPropagation();toggleCheck(${idx},${sIdx})"><input type="checkbox" ${isChecked?'checked':''}> <span>${texto}</span></div>`;
            }).join('');
            const isOpen = idsAbertos.has(idx) ? 'open' : '';
            const item = document.createElement('div');
            item.className = `roteiro-item ${isOpen}`;
            item.innerHTML = `
                <div class="roteiro-header" onclick="gerenciarAbertura(${idx},this.parentElement)">
                    <div><span class="data-badge">${r.data}</span> <b>${r.aula}</b></div>
                    <span>▼</span>
                </div>
                <div class="roteiro-content">
                    <button onclick="abrirModal(${idx})" style="float:right;cursor:pointer;padding:5px 10px;border-radius:8px;border:1px solid #cfd8dc;">✏️ Editar</button>
                    <div style="white-space:pre-wrap;margin-top:10px;">${r.titulo}</div>
                    ${subs}
                </div>`;
            lista.appendChild(item);
        });
    }

    async function sincronizar() { await fetch(URL_FIREBASE,{method:'PUT',body:JSON.stringify(banco)}); }

    function toggleCheck(roteiroIdx, subIdx) {
        let sub = banco[turmaAtiva].roteiros[roteiroIdx].subtopicos[subIdx];
        if(typeof sub==='string') banco[turmaAtiva].roteiros[roteiroIdx].subtopicos[subIdx]={texto:sub,feito:true};
        else banco[turmaAtiva].roteiros[roteiroIdx].subtopicos[subIdx].feito = !banco[turmaAtiva].roteiros[roteiroIdx].subtopicos[subIdx].feito;
        sincronizar(); renderizarHistorico();
    }

    function salvarNovo() {
        const d=document.getElementById('dataInput').value, a=document.getElementById('aulaInput').value, t=document.getElementById('textoPrincipal').value;
        if(!d||!t) return alert("Preencha data e conteúdo.");
        if(!banco[turmaAtiva].roteiros) banco[turmaAtiva].roteiros=[];
        banco[turmaAtiva].roteiros.unshift({data:d,aula:a,titulo:t,subtopicos:[]});
        sincronizar(); renderizarHistorico();
        document.getElementById('dataInput').value=''; document.getElementById('aulaInput').value=''; document.getElementById('textoPrincipal').value='';
    }

    function abrirModal(idx) {
        indexEditando=idx; const r=banco[turmaAtiva].roteiros[idx];
        document.getElementById('editData').value=r.data; document.getElementById('editAula').value=r.aula; document.getElementById('editTitulo').value=r.titulo;
        const area=document.getElementById('areaSubtopicosEdit'); area.innerHTML='';
        (r.subtopicos||[]).forEach(s => {
            const texto=typeof s==='object'?s.texto:s;
            area.innerHTML+=`<div style="display:flex;gap:10px;"><textarea class="input-sub" style="min-height:45px;margin:5px 0;">${texto}</textarea><button onclick="this.parentElement.remove()">❌</button></div>`;
        });
        document.getElementById('modalEdicao').style.display='flex';
    }

    function adicionarLinhaSubtopico() {
        const div=document.createElement('div'); div.style.display="flex"; div.style.gap="10px";
        div.innerHTML=`<textarea class="input-sub" style="min-height:45px;margin:5px 0;" placeholder="Novo tópico..."></textarea><button onclick="this.parentElement.remove()">❌</button>`;
        document.getElementById('areaSubtopicosEdit').appendChild(div);
    }

    function salvarAlteracoes() {
        const inputs=document.querySelectorAll('.input-sub');
        const subsAntigos=banco[turmaAtiva].roteiros[indexEditando].subtopicos||[];
        banco[turmaAtiva].roteiros[indexEditando].subtopicos=Array.from(inputs).map((i,idx)=>({texto:i.value,feito:subsAntigos[idx]?.feito||false})).filter(v=>v.texto!=="");
        banco[turmaAtiva].roteiros[indexEditando].data=document.getElementById('editData').value;
        banco[turmaAtiva].roteiros[indexEditando].aula=document.getElementById('editAula').value;
        banco[turmaAtiva].roteiros[indexEditando].titulo=document.getElementById('editTitulo').value;
        sincronizar(); renderizarHistorico(); fecharModal();
    }

    function fecharModal(){document.getElementById('modalEdicao').style.display='none';}
    function excluirRegistro(){if(confirm("Apagar permanentemente?")){banco[turmaAtiva].roteiros.splice(indexEditando,1);sincronizar();renderizarHistorico();fecharModal();}}
    carregar();
</script>
</body>
</html>
