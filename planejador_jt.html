<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejador — UE João Tavares da Costa</title>
    <style>
        :root { 
            --primary: #cfd8dc; 
            --card-bg: #ffffff; 
            --text-dark: #263238; 
            --header-bg: #546e7a; 
            --accent: #ffccbc; 
            --shadow: 0 4px 12px rgba(0,0,0,0.08); 
            --bg-6: #546e7a; --bg-7: #78909c; --bg-8: #8d6e63; --bg-9: #6d4c41;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--primary); color: var(--text-dark); margin: 0; padding: 15px; line-height: 1.5; }
        .container { width: 100%; max-width: 1200px; margin: auto; }
        .top-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-turma-top { background: white; border: 1px solid #b0bec5; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--header-bg); transition: 0.2s; }
        .btn-turma-top.active { background: var(--header-bg); color: white; border-color: var(--header-bg); }
        .header-unidade { background: var(--header-bg); padding: 20px; border-radius: 15px; color: white; text-align: center; margin-bottom: 25px; box-shadow: var(--shadow); }
        .header-unidade h1 { margin: 0; font-size: 1.6rem; }
        .layout-principal { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
        .sidebar-schedule { background: #eceff1; padding: 20px; border-radius: 20px; border: 1px solid #b0bec5; box-shadow: var(--shadow); position: sticky; top: 15px; }
        .sidebar-schedule h3 { margin-top: 0; text-align: center; color: var(--header-bg); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .day-label { font-size: 0.75rem; font-weight: bold; color: var(--header-bg); margin-top: 15px; text-transform: uppercase; }
        .schedule-tag { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin-bottom: 8px; padding: 10px; border-radius: 8px; color: white; font-weight: 600; }
        .section-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid #cfd8dc; }
        .roteiro-item { background: #fff; border: 1px solid #cfd8dc; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .roteiro-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; font-weight: bold; }
        .roteiro-content { display: none; padding: 15px; border-top: 1px solid #eee; background: #fff; }
        .roteiro-item.open .roteiro-content { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #cfd8dc; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        .btn-main { background-color: var(--header-bg); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        .row-compacta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-badge { background: var(--header-bg); color: white; padding: 3px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-right: 10px; }
        .subtopico-view { display: flex; align-items: center; gap: 10px; padding: 8px; background: #f1f8e9; border-radius: 8px; margin-top: 5px; font-size: 0.9rem; border: 1px solid #dcedc8; cursor: pointer; }
        .subtopico-view.checked { background: #f8f9fa; border-color: #e0e0e0; color: #9e9e9e; text-decoration: line-through; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
        @media(max-width:700px){.layout-principal{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div class="top-nav" id="turmaGrid"></div>
    <div class="header-unidade">
        <h1>João Tavares da Costa</h1>
        <p>Planejamento Semanal - Raquel Aguiar</p>
    </div>
    <div class="layout-principal">
        <div class="sidebar-schedule">
            <h3>📅 Quadro da Semana</h3>
            <div id="homeDaysGrid"></div>
        </div>
        <div id="painelTurma" style="display:none;">
            <div class="section-card">
                <h3 id="tituloTurmaDinamico" style="margin-top:0; color:var(--header-bg)">✍️ Novo Planejamento</h3>
                <div class="row-compacta">
                    <input type="text" id="dataInput" placeholder="Data (Apenas números)" maxlength="10" onkeyup="mascaraData(this)">
                    <input type="text" id="aulaInput" placeholder="Aula (Ex: 1ª e 2ª)">
                </div>
                <textarea id="textoPrincipal" placeholder="O que será trabalhado?"></textarea>
                <button class="btn-main" onclick="salvarNovo()">💾 Salvar Planejamento</button>
            </div>
            <div id="listaHistorico"></div>
        </div>
    </div>
</div>

<div id="modalEdicao" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--header-bg)">Editar Registro</h3>
        <div class="row-compacta">
            <input type="text" id="editData" onkeyup="mascaraData(this)" maxlength="10">
            <input type="text" id="editAula">
        </div>
        <textarea id="editTitulo" rows="4"></textarea>
        <div id="areaSubtopicosEdit"></div>
        <button style="width:100%;margin-top:10px;padding:10px;cursor:pointer;border-radius:10px;border:1px solid #ddd;background:#f9f9f9;" onclick="adicionarLinhaSubtopico()">+ Novo Tópico</button>
        <div style="margin-top:20px;display:flex;gap:10px;">
            <button class="btn-main" onclick="salvarAlteracoes()" style="flex:2">💾 Atualizar</button>
            <button class="btn-main" style="background:#90a4ae; flex:1" onclick="fecharModal()">Sair</button>
        </div>
        <button onclick="excluirRegistro()" style="width:100%;background:none;border:none;color:#d32f2f;cursor:pointer;margin-top:20px;font-weight:bold;">🗑️ EXCLUIR PERMANENTE</button>
    </div>
</div>

<script>
    // URL DO BANCO COM SEUS DADOS REAIS
    const URL_FIREBASE = "https://planejador-raquel-default-rtdb.firebaseio.com/joao_tavares_data.json";
    const CORES = { "6º ano": "#546e7a", "7º ano": "#78909c", "8º ano": "#8d6e63", "9º ano": "#6d4c41" };
    const DIAS_SEMANA = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
    
    let banco = {}; 
    let turmaAtiva = ""; 
    let indexEditando = null;
    let idsAbertos = new Set();

    async function carregar() {
        try {
            const res = await fetch(URL_FIREBASE);
            const dadosRecuperados = await res.json();
            banco = dadosRecuperados || {};
            
            if (!Object.keys(banco).length) {
                console.warn("Banco de dados retornado vazio.");
            }

            renderizarTurmas(); 
            renderizarHome();
            if(turmaAtiva) renderizarHistorico();
        } catch (e) {
            console.error("Erro na conexão:", e);
        }
    }

    // Atualização automática a cada 5 segundos (apenas se não estiver editando)
    setInterval(() => { 
        if(document.getElementById('modalEdicao').style.display !== 'flex') carregar(); 
    }, 5000);

    function mascaraData(i) {
        let v = i.value.replace(/\D/g, "");
        if(v.length >= 2) v = v.substring(0,2) + "/" + v.substring(2);
        if(v.length >= 5) v = v.substring(0,5) + "/" + v.substring(5,9);
        i.value = v;
    }

    function renderizarTurmas() {
        const grid = document.getElementById('turmaGrid'); 
        grid.innerHTML = '';
        ["6º ano","7º ano","8º ano","9º ano"].forEach(nome => {
            const id = `JT_${nome.replace(/\s/g,'_')}`;
            const btn = document.createElement('button');
            btn.className = `btn-turma-top ${turmaAtiva===id?'active':''}`;
            btn.innerText = nome;
            btn.onclick = () => { 
                turmaAtiva=id; 
                idsAbertos.clear(); 
                document.getElementById('painelTurma').style.display='block'; 
                document.getElementById('tituloTurmaDinamico').innerText = `✍️ Planejamento: ${nome}`;
                renderizarTurmas(); 
                renderizarHistorico(); 
            };
            grid.appendChild(btn);
        });
    }

    function renderizarHome() {
        const grid = document.getElementById('homeDaysGrid'); 
        grid.innerHTML = '';
        
        DIAS_SEMANA.forEach(dia => {
            let aulasDia = [];
            ["6º ano","7º ano","8º ano","9º ano"].forEach(nome => {
                const id = `JT_${nome.replace(/\s/g,'_')}`;
                if(banco[id]?.horários?.[dia]) {
                    banco[id].horários[dia].forEach(h => {
                        if(h && h.trim()) aulasDia.push({h, t:nome});
                    });
                }
            });

            if (aulasDia.length > 0) {
                let html = `<div class="day-label">${dia}</div>`;
                aulasDia.sort((a,b)=>(parseInt(a.h)||0)-(parseInt(b.h)||0)).forEach(item => { 
                    html += `<div class="schedule-tag" style="background:${CORES[item.t]}">${item.h} - ${item.t}</div>`; 
                });
                grid.innerHTML += html;
            }
        });
    }

    function gerenciarAbertura(idx, elemento) {
        if(idsAbertos.has(idx)){
            idsAbertos.delete(idx);
            elemento.classList.remove('open');
        } else {
            idsAbertos.add(idx);
            elemento.classList.add('open');
        }
    }

    function renderizarHistorico() {
        const lista = document.getElementById('listaHistorico');
        lista.innerHTML = '<h3>📚 Histórico de Planejamento</h3>';
        
        if(!banco[turmaAtiva] || !banco[turmaAtiva].roteiros) {
            lista.innerHTML += '<p style="text-align:center; color:#999;">Nenhum registro encontrado para esta turma.</p>';
            return;
        }

        banco[turmaAtiva].roteiros.forEach((r, idx) => {
            let subs = (r.subtopicos||[]).map((s,sIdx) => {
                const isChecked = (typeof s === 'object') ? s.feito : false;
                const texto = (typeof s === 'object') ? s.texto : s;
                return `
                    <div class="subtopico-view ${isChecked?'checked':''}" onclick="event.stopPropagation();toggleCheck(${idx},${sIdx})">
                        <input type="checkbox" ${isChecked?'checked':''}> 
                        <span>${texto}</span>
                    </div>`;
            }).join('');

            const isOpen = idsAbertos.has(idx) ? 'open' : '';
            const item = document.createElement('div');
            item.className = `roteiro-item ${isOpen}`;
            item.innerHTML = `
                <div class="roteiro-header" onclick="gerenciarAbertura(${idx},this.parentElement)">
                    <div><span class="data-badge">${r.data}</span> <b>${r.aula}</b></div>
                    <span>▼</span>
                </div>
                <div class="roteiro-content">
                    <button onclick="abrirModal(${idx})" style="float:right;cursor:pointer;padding:5px 10px;border-radius:8px;border:1px solid #cfd8dc; background:white;">✏️ Editar</button>
                    <div style="white-space:pre-wrap;margin-top:10px; font-weight:500;">${r.titulo}</div>
                    <div style="margin-top:10px;">${subs}</div>
                </div>`;
            lista.appendChild(item);
        });
    }

    async function sincronizar() { 
        try {
            await fetch(URL_FIREBASE, { method:'PUT', body:JSON.stringify(banco) });
            renderizarHome();
        } catch (e) {
            alert("Erro ao salvar dados. Verifique sua internet.");
        }
    }

    function toggleCheck(roteiroIdx, subIdx) {
        let r = banco[turmaAtiva].roteiros[roteiroIdx];
        let sub = r.subtopicos[subIdx];
        
        if(typeof sub === 'string') {
            r.subtopicos[subIdx] = { texto: sub, feito: true };
        } else {
            r.subtopicos[subIdx].feito = !r.subtopicos[subIdx].feito;
        }
        
        sincronizar(); 
        renderizarHistorico();
    }

    function salvarNovo() {
        const d = document.getElementById('dataInput').value;
        const a = document.getElementById('aulaInput').value;
        const t = document.getElementById('textoPrincipal').value;
        
        if(!d || !t) return alert("Preencha ao menos a data e o conteúdo principal.");
        
        if(!banco[turmaAtiva]) banco[turmaAtiva] = { roteiros: [], horários: {} };
        if(!banco[turmaAtiva].roteiros) banco[turmaAtiva].roteiros = [];
        
        banco[turmaAtiva].roteiros.unshift({ data: d, aula: a, titulo: t, subtopicos: [] });
        
        sincronizar(); 
        renderizarHistorico();
        
        document.getElementById('dataInput').value = ''; 
        document.getElementById('aulaInput').value = ''; 
        document.getElementById('textoPrincipal').value = '';
    }

    function abrirModal(idx) {
        indexEditando = idx; 
        const r = banco[turmaAtiva].roteiros[idx];
        
        document.getElementById('editData').value = r.data || ""; 
        document.getElementById('editAula').value = r.aula || ""; 
        document.getElementById('editTitulo').value = r.titulo || "";
        
        const area = document.getElementById('areaSubtopicosEdit'); 
        area.innerHTML = '';
        
        (r.subtopicos || []).forEach(s => {
            const texto = (typeof s === 'object') ? s.texto : s;
            area.innerHTML += `
                <div style="display:flex;gap:10px;">
                    <textarea class="input-sub" style="min-height:45px;margin:5px 0;">${texto}</textarea>
                    <button onclick="this.parentElement.remove()" style="background:none; border:none; cursor:pointer;">❌</button>
                </div>`;
        });
        document.getElementById('modalEdicao').style.display = 'flex';
    }

    function adicionarLinhaSubtopico() {
        const div = document.createElement('div'); 
        div.style.display = "flex"; 
        div.style.gap = "10px";
        div.innerHTML = `<textarea class="input-sub" style="min-height:45px;margin:5px 0;" placeholder="Novo tópico..."></textarea><button onclick="this.parentElement.remove()" style="background:none; border:none; cursor:pointer;">❌</button>`;
        document.getElementById('areaSubtopicosEdit').appendChild(div);
    }

    function salvarAlteracoes() {
        const inputs = document.querySelectorAll('.input-sub');
        const roteiro = banco[turmaAtiva].roteiros[indexEditando];
        const subsAntigos = roteiro.subtopicos || [];
        
        roteiro.data = document.getElementById('editData').value;
        roteiro.aula = document.getElementById('editAula').value;
        roteiro.titulo = document.getElementById('editTitulo').value;
        
        roteiro.subtopicos = Array.from(inputs).map((input, idx) => {
            return {
                texto: input.value,
                feito: (subsAntigos[idx] && typeof subsAntigos[idx] === 'object') ? subsAntigos[idx].feito : false
            };
        }).filter(v => v.texto.trim() !== "");
        
        sincronizar(); 
        renderizarHistorico(); 
        fecharModal();
    }

    function fecharModal() {
        document.getElementById('modalEdicao').style.display = 'none'; 
        indexEditando = null;
    }

    function excluirRegistro() {
        if(confirm("Deseja apagar este planejamento permanentemente?")) {
            banco[turmaAtiva].roteiros.splice(indexEditando, 1);
            sincronizar();
            renderizarHistorico();
            fecharModal();
        }
    }

    // Início
    carregar();
</script>
</body>
</html>
